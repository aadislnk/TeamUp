spring.application.name=teamup-backend

spring.profiles.active=local

spring.config.import=optional:application-local.properties

# Database
spring.datasource.url=jdbc:postgresql://ep-round-brook-aoj28g8k-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${db.password}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=theinboxdesk@gmail.com
spring.mail.password=${mail.password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application Mail Settings
app.mail.from-address=${spring.mail.username}
app.mail.from-name=TeamUp

app.otp.length=6
app.otp.expiry-minutes=10
app.otp.resend-cooldown-seconds=60
app.otp.max-resend-attempts=5
app.otp.max-verification-attempts=5

# JWT
jwt.secret=${jwt.secret}
jwt.expiration=86400000

# Swagger
# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha 
